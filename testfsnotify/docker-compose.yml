services:
  writer:
    image: alpine:3.19
    volumes:
      - ${DATA_DIR:-./data}:/data
    command:
      - sh
      - -c
      - |
        i=0
        while [ $$i -lt 50 ]; do
          echo "{\"seq\":$$i,\"ts\":\"$$(date -Iseconds)\"}" >> /data/events.log
          i=$$((i+1))
          sleep 0.2
        done
        echo "DONE" >> /data/events.log
