# PostgreSQL database overlay for BDD tests.
# Adds a PostgreSQL service and overrides storage config via env vars.
# Does NOT change the registry command — layer on top of any feature config.
#
# Usage:
#   docker compose -f docker-compose.base.yml -f docker-compose.auth.yml -f docker-compose.db-postgres.yml up -d --build --wait

services:
  schema-registry:
    environment:
      SCHEMA_REGISTRY_STORAGE_TYPE: postgresql
      SCHEMA_REGISTRY_PG_HOST: postgres
      SCHEMA_REGISTRY_PG_PORT: "5432"
      SCHEMA_REGISTRY_PG_DATABASE: schemaregistry
      SCHEMA_REGISTRY_PG_USER: schemaregistry
      SCHEMA_REGISTRY_PG_PASSWORD: schemaregistry
      SCHEMA_REGISTRY_PG_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: schemaregistry
      POSTGRES_PASSWORD: schemaregistry
      POSTGRES_DB: schemaregistry
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schemaregistry"]
      interval: 5s
      timeout: 3s
      retries: 10
