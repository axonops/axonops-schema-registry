server:
  host: "0.0.0.0"
  port: 8081
storage:
  type: memory
compatibility:
  default_level: BACKWARD
logging:
  level: info
  format: json
security:
  audit:
    enabled: true
    log_file: /tmp/audit.log
  auth:
    enabled: true
    methods:
      - oidc
    oidc:
      enabled: true
      issuer_url: "http://keycloak:8080/realms/schema-registry"
      client_id: "schema-registry"
      client_secret: "schema-registry-secret"
      username_claim: "preferred_username"
      roles_claim: "groups"
      role_mapping:
        "/schema-registry-admins": "admin"
        "/developers": "developer"
        "/readonly-users": "readonly"
      default_role: "readonly"
      skip_issuer_check: true
    rbac:
      enabled: true
      default_role: readonly
