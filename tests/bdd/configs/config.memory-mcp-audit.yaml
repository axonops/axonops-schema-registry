server:
  host: "0.0.0.0"
  port: 8081
  docs_enabled: true
  metrics_refresh_interval: 5
storage:
  type: memory
compatibility:
  default_level: BACKWARD
logging:
  level: info
  format: json
security:
  auth:
    enabled: true
    methods:
      - basic
    bootstrap:
      enabled: true
      username: admin
      password: admin-password
  audit:
    enabled: true
    log_file: /tmp/audit.log
mcp:
  enabled: true
  host: "0.0.0.0"
  port: 9081
  permission_preset: "full"
