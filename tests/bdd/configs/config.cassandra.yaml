server:
  host: "0.0.0.0"
  port: 8081
  docs_enabled: true
  metrics_refresh_interval: 5
storage:
  type: cassandra
  cassandra:
    hosts:
      - cassandra
    port: 9042
    keyspace: schemaregistry
    consistency: ONE
    migrate: true
compatibility:
  default_level: BACKWARD
logging:
  level: info
  format: json
security:
  audit:
    enabled: true
    log_file: /tmp/audit.log
