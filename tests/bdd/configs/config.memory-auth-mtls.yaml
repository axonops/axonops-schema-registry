server:
  host: "0.0.0.0"
  port: 8081
storage:
  type: memory
compatibility:
  default_level: BACKWARD
logging:
  level: info
  format: json
security:
  audit:
    enabled: true
    log_file: /tmp/audit.log
  auth:
    enabled: true
    methods:
      - basic
    bootstrap:
      enabled: true
      username: admin
      password: admin
    basic:
      realm: "Schema Registry"
    rbac:
      enabled: true
      default_role: readonly
