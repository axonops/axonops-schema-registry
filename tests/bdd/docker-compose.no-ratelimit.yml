# Overlay that disables rate limiting for client SerDe tests.
# Rate limiting MUST be disabled when running compatibility tests because
# they fire many requests rapidly and would otherwise hit 429 errors.
#
# Usage:
#   docker compose -f docker-compose.base.yml -f docker-compose.auth.yml \
#     -f docker-compose.no-ratelimit.yml up -d --build --wait

services:
  schema-registry:
    environment:
      SCHEMA_REGISTRY_RATE_LIMIT_ENABLED: "false"
