# MCP + Audit overlay for BDD tests.
# Layers on top of docker-compose.base.yml to enable the MCP server
# with audit logging to a file that can be read via docker exec.
#
# Usage:
#   docker compose -f docker-compose.base.yml -f docker-compose.mcp-audit.yml up -d --build --wait
#   docker compose -p <project> exec schema-registry cat /tmp/audit.log

services:
  schema-registry:
    command: ["--config", "/etc/schema-registry/config.memory-mcp-audit.yaml"]
    environment:
      REGISTRY_CONFIG: /etc/schema-registry/config.memory-mcp-audit.yaml
      SCHEMA_REGISTRY_MCP_REQUIRE_CONFIRMATIONS: "true"
      SCHEMA_REGISTRY_MCP_CONFIRMATION_TTL: "300"
    ports:
      - "${MCP_PORT:-19081}:9081"
