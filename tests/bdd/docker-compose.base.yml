# Base Docker Compose for BDD tests.
# The schema-registry container includes webhook for process control.
# TLS and audit logging are enabled by default so every test stack can
# assert on transport_security and audit events without extra overlays.
# Usage:
#   docker compose -f docker-compose.base.yml -f docker-compose.memory.yml up -d --build --wait

services:
  schema-registry:
    build:
      context: ../../
      dockerfile: tests/bdd/docker/Dockerfile.registry
    init: true
    ports:
      - "${REGISTRY_PORT:-18081}:8081"
      - "${WEBHOOK_PORT:-19000}:9000"
    volumes:
      - ./configs:/etc/schema-registry:ro
      - ./certs/mtls/server.pem:/etc/tls/server.pem:ro
      - ./certs/mtls/server-key.pem:/etc/tls/server-key.pem:ro
      - ./certs/mtls/ca.pem:/etc/tls/ca.pem:ro
    environment:
      SCHEMA_REGISTRY_TLS_ENABLED: "true"
      SCHEMA_REGISTRY_TLS_CERT_FILE: "/etc/tls/server.pem"
      SCHEMA_REGISTRY_TLS_KEY_FILE: "/etc/tls/server-key.pem"
      SCHEMA_REGISTRY_TLS_MIN_VERSION: "TLS1.3"
      SCHEMA_REGISTRY_AUDIT_ENABLED: "true"
      SCHEMA_REGISTRY_AUDIT_FILE_ENABLED: "true"
      SCHEMA_REGISTRY_AUDIT_FILE_PATH: "/tmp/audit.log"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--no-check-certificate", "https://localhost:8081/"]
      interval: 5s
      timeout: 3s
      start_period: 90s
      retries: 10
    restart: "no"
