# MySQL database overlay for BDD tests.
# Adds a MySQL service and overrides storage config via env vars.
# Does NOT change the registry command — layer on top of any feature config.
#
# Usage:
#   docker compose -f docker-compose.base.yml -f docker-compose.auth.yml -f docker-compose.db-mysql.yml up -d --build --wait

services:
  schema-registry:
    environment:
      SCHEMA_REGISTRY_STORAGE_TYPE: mysql
      SCHEMA_REGISTRY_MYSQL_HOST: mysql
      SCHEMA_REGISTRY_MYSQL_PORT: "3306"
      SCHEMA_REGISTRY_MYSQL_DATABASE: schemaregistry
      SCHEMA_REGISTRY_MYSQL_USER: schemaregistry
      SCHEMA_REGISTRY_MYSQL_PASSWORD: schemaregistry
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: schemaregistry
      MYSQL_USER: schemaregistry
      MYSQL_PASSWORD: schemaregistry
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysql -h 127.0.0.1 -uschemaregistry -pschemaregistry -e 'SELECT 1' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 20
