# Docker Compose overlay that disables TLS on the schema-registry.
# Use this when running third-party client SerDe tests (Go, Java, Python)
# that cannot easily be configured for self-signed TLS certificates.
#
# Usage:
#   docker compose -f docker-compose.base.yml -f docker-compose.ldap.yml \
#     -f docker-compose.no-tls.yml up -d --build --wait

services:
  schema-registry:
    environment:
      SCHEMA_REGISTRY_TLS_ENABLED: "false"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/"]
      interval: 5s
      timeout: 3s
      start_period: 90s
      retries: 10
