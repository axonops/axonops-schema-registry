# KMS overlay for Docker-based BDD tests.
# Adds HashiCorp Vault and OpenBao Transit engines to any backend compose stack,
# and injects KMS environment variables into the schema-registry service.
# Usage:
#   docker compose -f docker-compose.base.yml -f docker-compose.postgres.yml -f docker-compose.kms-overlay.yml up -d --build --wait
#   BDD_BACKEND=postgres BDD_KMS=true BDD_TAGS="@kms" go test -tags bdd -v -count=1 -timeout 15m ./tests/bdd/...

services:
  schema-registry:
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "test-root-token"
      BAO_ADDR: "http://openbao:8200"
      BAO_TOKEN: "test-bao-token"
    depends_on:
      setup-kms:
        condition: service_completed_successfully

  vault:
    image: hashicorp/vault:1.15
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: test-root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "${VAULT_PORT:-18200}:8200"
    healthcheck:
      test: ["CMD", "sh", "-c", "VAULT_ADDR=http://127.0.0.1:8200 vault status"]
      interval: 5s
      timeout: 3s
      retries: 10

  openbao:
    image: openbao/openbao:2.1.1
    cap_add:
      - IPC_LOCK
    environment:
      BAO_DEV_ROOT_TOKEN_ID: test-bao-token
      BAO_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "${BAO_PORT:-18201}:8200"
    healthcheck:
      test: ["CMD", "sh", "-c", "BAO_ADDR=http://127.0.0.1:8200 bao status"]
      interval: 5s
      timeout: 3s
      retries: 10

  setup-kms:
    image: hashicorp/vault:1.15
    depends_on:
      vault:
        condition: service_healthy
      openbao:
        condition: service_healthy
    restart: "no"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        echo "Enabling Transit engine on Vault..."
        export VAULT_ADDR=http://vault:8200
        export VAULT_TOKEN=test-root-token
        vault secrets enable transit
        vault write -f transit/keys/test-key
        echo "Vault Transit engine ready."

        echo "Enabling Transit engine on OpenBao..."
        export VAULT_ADDR=http://openbao:8200
        export VAULT_TOKEN=test-bao-token
        vault secrets enable transit
        vault write -f transit/keys/test-key
        echo "OpenBao Transit engine ready."
