@version: 4.2
@include "scl.conf"

# Accept syslog over TCP on port 1514
source s_tcp {
    network(
        transport("tcp")
        port(1514)
        flags(no-parse)
    );
};

# Write all received messages to a file for test verification
destination d_file {
    file("/var/log/syslog-audit/audit.log"
        template("${MESSAGE}\n")
        flush-lines(1)
    );
};

log {
    source(s_tcp);
    destination(d_file);
};
