@version: 4.2
@include "scl.conf"

# Accept syslog over TCP on port 1514 (plaintext)
source s_tcp {
    network(
        transport("tcp")
        port(1514)
        flags(no-parse)
    );
};

# Accept syslog over TLS on port 6514
source s_tls {
    network(
        transport("tls")
        port(6514)
        tls(
            key-file("/etc/syslog-ng/certs/server-key.pem")
            cert-file("/etc/syslog-ng/certs/server.pem")
            ca-file("/etc/syslog-ng/certs/ca.pem")
            peer-verify(optional-untrusted)
        )
        flags(no-parse)
    );
};

# Write TCP messages to one file
destination d_tcp {
    file("/var/log/syslog-audit/audit.log"
        template("${MESSAGE}\n")
        flush-lines(1)
    );
};

# Write TLS messages to a separate file
destination d_tls {
    file("/var/log/syslog-audit/audit-tls.log"
        template("${MESSAGE}\n")
        flush-lines(1)
    );
};

log {
    source(s_tcp);
    destination(d_tcp);
};

log {
    source(s_tls);
    destination(d_tls);
};
