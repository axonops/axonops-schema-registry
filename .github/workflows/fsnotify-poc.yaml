name: fsnotify PoC

on:
  push:
    branches: [main, 'feature/**']
    paths:
      - 'testfsnotify/**'
      - '.github/workflows/fsnotify-poc.yaml'

env:
  GO_VERSION: '1.26.0'

jobs:
  fsnotify-docker-bindmount:
    name: fsnotify Docker Bind-Mount Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: testfsnotify
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Docker info
        run: |
          docker version
          docker compose version
          uname -r
          cat /proc/version

      - name: Run fsnotify bind-mount tests
        run: go test -v -timeout 120s ./...
